services:
  redis:
    image: redis:7.4-alpine
    container_name: ezulhreasqkpvbct-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build: .
    container_name: ezulhreasqkpvbct-api
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
      TORCH_HOME: /models/torch
      MAX_UPLOAD_BYTES: 2147483648
      ANNOTATION_DATA_DIR: /annotation-data
      ANNOTATION_EDITING_ENABLED: "false"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - backend-data:/data
      - model-cache:/models
      - ./annotation-data:/annotation-data
      - ./model-artifacts:/model-artifacts:ro

  worker:
    build: .
    container_name: ezulhreasqkpvbct-worker
    restart: unless-stopped
    depends_on:
      - redis
    command: ["python", "-m", "app.worker"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
      TORCH_HOME: /models/torch
      SEGMENTATION_MODEL_PATH: /model-artifacts/ml-days-2/saves/epoch_014.pth
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    volumes:
      - backend-data:/data
      - model-cache:/models
      - ./model-artifacts:/model-artifacts:ro

volumes:
  backend-data:
  model-cache:
  redis-data:
